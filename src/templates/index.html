{% extends "base.html" %}

{% block content %}
<h1>{{ title }}</h1>

<ul class="post-list">
{% for post in blog_index %}
    <li>
        <span class="post-date">{{ post.date }}</span>
        <a href="{{ post.path }}">{{ post.title }}</a>
        {% if post.tags %}
        <span class="tags">
        {% for tag in post.tags %}
            <a href="/blog/tags/{{ tag }}/" class="tag">{{ tag }}</a>{% if not forloop.last %}, {% endif %}
        {% endfor %}
        </span>
        {% endif %}
    </li>
{% endfor %}
</ul>
{% endblock content %}
